<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Envelope Background -->
  <path d="M64 128L256 256L448 128V384H64V128Z" fill="#1a1a1a" stroke="url(#grad1)" stroke-width="20" stroke-linejoin="round"/>
  <path d="M64 128L256 256L448 128" fill="none" stroke="url(#grad1)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Circuit/Spark Element -->
  <circle cx="256" cy="256" r="20" fill="#00c6ff">
    <animate attributeName="r" values="20;25;20" dur="2s" repeatCount="indefinite" />
