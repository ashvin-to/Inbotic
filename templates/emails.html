{% extends "layout.html" %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-900">Recent Emails</h1>
    </div>

    <div class="bg-white shadow overflow-hidden sm:rounded-md">
        <ul role="list" class="divide-y divide-gray-200">
            {% for email in emails %}
            <li>
                <div class="px-4 py-4 sm:px-6 hover:bg-gray-50">
                    <div class="flex items-center justify-between">
                        <div class="truncate">
                            <p class="text-sm font-medium text-indigo-600 truncate">{{ email.subject }}</p>
                            <p class="text-sm text-gray-500 truncate">From: {{ email.sender }}</p>
                        </div>
                        <div class="ml-2 flex-shrink-0">
                            <p class="text-sm text-gray-500">{{ email.date }}</p>
                        </div>
                    </div>
                    <div class="mt-2">
                        <p class="text-sm text-gray-600 line-clamp-2">{{ email.snippet }}</p>
                    </div>
                </div>
            </li>
            {% else %}
            <li class="px-4 py-8 text-center text-gray-500">
                No emails found.
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
